<!DOCTYPE html>
<!--
  Visma House Oslo — Waste logging / Avfallsregistrering (operations staff)
  Standalone single-file app. Flow: fraction → floor (1–9) → kilos (+ optional
  photo) → save. Local log (localStorage) + CSV export. Language: Norsk / English.
  No backend, no secrets. Brand: white / Visma Black #131313 / Visma Purple #7F56FA.
  Belongs in the "Operations" repo → served at /Operations/avfall.html (or index.html).
-->
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EEF1F3">
<title>Waste · Visma House Oslo</title>
<style>
  :root{
    --ink:#131313; --ink-2:#3A3A44; --muted:#8A8A95; --line:#E3E7EA;
    --bg:#EEF1F3; --card:#FFFFFF; --brand:#7F56FA; --ok:#16A34A;
    --radius:20px; --shadow:0 10px 30px rgba(19,19,19,.08);
    --font:"Helvetica Neue",Helvetica,Arial,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100dvh}
  .wrap{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
        padding:calc(10px + env(safe-area-inset-top)) 16px calc(88px + env(safe-area-inset-bottom))}

  header{display:flex;align-items:center;gap:10px;margin:4px 2px 14px}
  .logo{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-size:18px;
        background:linear-gradient(135deg,#9F7BFF,#5B33E0);box-shadow:0 3px 10px rgba(127,86,250,.35)}
  header h1{font-size:17px;font-weight:800}
  header small{display:block;font-size:11px;color:var(--muted);font-weight:600}
  .lang{margin-left:auto;display:flex;gap:5px}
  .lang button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 10px;font-family:inherit;
               font-size:12px;font-weight:800;color:var(--ink-2);cursor:pointer}
  .lang button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .steps{display:flex;gap:6px;margin:0 2px 14px}
  .steps div{flex:1;height:5px;border-radius:3px;background:var(--line)}
  .steps div.on{background:var(--brand)}

  h2.q{font-size:19px;font-weight:800;margin:2px 2px 12px}
  .sub{font-size:13px;color:var(--muted);font-weight:600;margin:-8px 2px 14px}

  .fracs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .frac{border:none;border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:left;
        color:#fff;font-family:inherit;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;
        box-shadow:var(--shadow);transition:transform .12s}
  .frac:active{transform:scale(.97)}
  .frac .fi{font-size:30px;line-height:1}
  .frac .fn{font-size:15px;font-weight:800;line-height:1.15}

  .floors{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .floor{border:1px solid var(--line);background:var(--card);border-radius:var(--radius);
         font-family:inherit;font-size:30px;font-weight:800;color:var(--ink);cursor:pointer;
         padding:20px 0;box-shadow:var(--shadow);transition:transform .12s}
  .floor:active{transform:scale(.96)}
  .floor small{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}

  .chosen{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
          padding:12px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;margin-bottom:14px;font-weight:700}
  .chip{padding:5px 10px;border-radius:999px;color:#fff;font-size:12px;font-weight:800}
  .kgshow{text-align:center;font-size:46px;font-weight:800;letter-spacing:-1px;margin:6px 0 14px}
  .kgshow span{font-size:22px;color:var(--muted);font-weight:700}
  .keys{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .key{border:1px solid var(--line);background:var(--card);border-radius:16px;font-family:inherit;
       font-size:26px;font-weight:800;color:var(--ink);cursor:pointer;padding:16px 0;box-shadow:var(--shadow)}
  .key:active{transform:scale(.96)}

  .photoBtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;
            border:1px dashed #C9CCD4;background:#fff;border-radius:14px;padding:14px;font-family:inherit;
            font-size:14px;font-weight:700;color:var(--ink-2);cursor:pointer}
  .photoBtn img{width:40px;height:40px;border-radius:8px;object-fit:cover}
  .save{width:100%;margin-top:14px;border:none;border-radius:16px;background:var(--ink);color:#fff;
        font-family:inherit;font-size:17px;font-weight:800;padding:18px;cursor:pointer;box-shadow:var(--shadow)}
  .save[disabled]{opacity:.4}
  .backBtn{background:none;border:none;color:var(--brand);font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;padding:6px 2px;margin-bottom:6px}

  .totals{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .tot{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 11px;font-size:12px;font-weight:700}
  .tot span{color:#fff;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:800;margin-right:6px}
  .grand{background:var(--ink);color:#fff;border-radius:14px;padding:14px 16px;font-weight:800;font-size:15px;margin-bottom:14px;display:flex;justify-content:space-between}
  .entry{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:8px}
  .entry .dot{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-size:18px;color:#fff}
  .entry .einfo{flex:1;min-width:0}
  .entry .einfo b{font-size:14px;font-weight:800;display:block}
  .entry .einfo small{font-size:12px;color:var(--muted)}
  .entry .ekg{font-weight:800;font-size:15px}
  .entry img.eth{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
  .rowbtns{display:flex;gap:10px;margin-top:6px}
  .rowbtns button{flex:1;border-radius:14px;padding:14px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
  .exp{border:none;background:var(--brand);color:#fff}
  .clr{border:1px solid var(--line);background:#fff;color:var(--ink-2)}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;line-height:1.6}

  nav{position:fixed;left:0;right:0;bottom:0;height:72px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
      border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;
      padding-bottom:env(safe-area-inset-bottom);z-index:20}
  nav button{background:none;border:none;font-family:inherit;font-size:11px;font-weight:800;color:var(--muted);
             display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;width:120px}
  nav button .ni{font-size:22px}
  nav button.on{color:var(--brand)}

  .toast{position:fixed;left:16px;right:16px;bottom:88px;max-width:490px;margin:0 auto;background:var(--ink);color:#fff;
         border-radius:14px;padding:14px 16px;font-weight:700;font-size:14px;
         opacity:0;transform:translateY(14px);transition:.3s;pointer-events:none;z-index:30;box-shadow:0 14px 30px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateY(0)}
  .hide{display:none!important}

  /* PIN-lås (åpner appen i 12 timer) */
  #pinGate{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
  #pinGate .pinTitle{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px}
  #pinGate .pinDots{font-size:24px;letter-spacing:8px;color:var(--brand);min-height:30px}
  #pinGate .pinErr{color:#D6353B;font-size:13px;font-weight:700;min-height:18px;margin:6px 0 10px}
  #pinGate .pinKeys{display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-top:6px}
  #pinGate .pinKeys button{width:72px;height:62px;border:1px solid var(--line);background:var(--card);border-radius:16px;font-family:inherit;font-size:24px;font-weight:800;color:var(--ink);cursor:pointer;box-shadow:var(--shadow)}
  #pinGate .pinKeys button:active{transform:scale(.96)}
</style>
</head>
<body>
  <div id="pinGate">
    <div class="logo" style="width:52px;height:52px;font-size:26px;margin-bottom:16px">♻️</div>
    <div class="pinTitle">🔒 Tast tilgangskode · Access code</div>
    <div class="pinDots" id="pinDots"></div>
    <div class="pinErr" id="pinErr"></div>
    <div class="pinKeys">
      <button onclick="keyPin('1')">1</button>
      <button onclick="keyPin('2')">2</button>
      <button onclick="keyPin('3')">3</button>
      <button onclick="keyPin('4')">4</button>
      <button onclick="keyPin('5')">5</button>
      <button onclick="keyPin('6')">6</button>
      <button onclick="keyPin('7')">7</button>
      <button onclick="keyPin('8')">8</button>
      <button onclick="keyPin('9')">9</button>
      <button style="visibility:hidden" aria-hidden="true"></button>
      <button onclick="keyPin('0')">0</button>
      <button onclick="delPin()">⌫</button>
    </div>
  </div>
  <div class="wrap">
    <header>
      <div class="logo">♻️</div>
      <div><h1 data-i18n="app_title">Avfallsregistrering</h1><small data-i18n="app_sub">Visma House Oslo · drift</small></div>
      <div class="lang">
        <button data-lang="no" onclick="setLang('no')">NO</button>
        <button data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </header>

    <!-- ============ REGISTER (wizard) ============ -->
    <section id="reg">
      <div class="steps"><div id="st1" class="on"></div><div id="st2"></div><div id="st3"></div></div>

      <div id="step1">
        <h2 class="q" data-i18n="q_fraction">Velg fraksjon</h2>
        <div class="fracs" id="fracGrid"></div>
      </div>

      <div id="step2" class="hide">
        <button class="backBtn" data-i18n="back" onclick="goStep(1)">‹ Tilbake</button>
        <h2 class="q" data-i18n="q_floor">Hvilken etasje?</h2>
        <div class="floors" id="floorGrid"></div>
      </div>

      <div id="step3" class="hide">
        <button class="backBtn" data-i18n="back" onclick="goStep(2)">‹ Tilbake</button>
        <div class="chosen"><span class="chip" id="chChip"></span><span id="chFloor"></span></div>
        <div class="kgshow"><span id="kgVal">0</span> <span>kg</span></div>
        <div class="keys">
          <button class="key" onclick="keyKg('1')">1</button>
          <button class="key" onclick="keyKg('2')">2</button>
          <button class="key" onclick="keyKg('3')">3</button>
          <button class="key" onclick="keyKg('4')">4</button>
          <button class="key" onclick="keyKg('5')">5</button>
          <button class="key" onclick="keyKg('6')">6</button>
          <button class="key" onclick="keyKg('7')">7</button>
          <button class="key" onclick="keyKg('8')">8</button>
          <button class="key" onclick="keyKg('9')">9</button>
          <button class="key" id="kDec" onclick="keyKg('.')">,</button>
          <button class="key" onclick="keyKg('0')">0</button>
          <button class="key" onclick="kgBack()">⌫</button>
        </div>
        <input type="file" id="photoInput" accept="image/*" capture="environment" class="hide" onchange="onPhoto(this)">
        <button class="photoBtn" id="photoBtn" onclick="document.getElementById('photoInput').click()"></button>
        <button class="save" id="saveBtn" onclick="saveEntry()" data-i18n="save" disabled>Lagre registrering</button>
      </div>
    </section>

    <!-- ============ LOG ============ -->
    <section id="logView" class="hide">
      <h2 class="q" data-i18n="log_title">Logg</h2>
      <div class="grand"><span data-i18n="total_today">Totalt i dag</span><span id="grandKg">0 kg</span></div>
      <div class="totals" id="totals"></div>
      <div id="entries"></div>
      <div class="rowbtns" id="logBtns">
        <button class="exp" data-i18n="export" onclick="exportCsv()">⬇ Eksporter CSV</button>
        <button class="clr" data-i18n="clear" onclick="clearLog()">Tøm logg</button>
      </div>
    </section>
  </div>

  <nav>
    <button id="navReg" class="on" onclick="showView('reg')"><span class="ni">➕</span><span data-i18n="nav_reg">Registrer</span></button>
    <button id="navLog" onclick="showView('log')"><span class="ni">📋</span><span data-i18n="nav_log">Logg</span></button>
  </nav>

  <div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
  /* ---- i18n (Norsk / English) ---- */
  const STR = {
    no:{ app_title:'Avfallsregistrering', app_sub:'Visma House Oslo · drift',
      q_fraction:'Velg fraksjon', q_floor:'Hvilken etasje?', back:'‹ Tilbake',
      floor_small:'etasje', save:'Lagre registrering', nav_reg:'Registrer', nav_log:'Logg',
      log_title:'Logg', total_today:'Totalt i dag', export:'⬇ Eksporter CSV', clear:'Tøm logg',
      photo_add:'📷 Legg ved bilde av vekten', photo_done:'Bilde lagt ved · trykk for å bytte',
      empty:'Ingen registreringer ennå.<br>Trykk «Registrer» for å starte.',
      saved:'Lagret', saved_nophoto:'Lagret (uten bilde – lite plass)', cleared:'Loggen er tømt',
      logempty:'Loggen er tom', csv_done:'CSV eksportert', photo_err:'Kunne ikke lese bildet', pin_wrong:'Feil kode',
      confirm_clear:'Tømme hele loggen? Eksporter til CSV først hvis du vil ta vare på dataene.',
      floor_entry:n=>n+'. etasje', csv_head:['Tidspunkt','Fraksjon','Etasje','Kilo'] },
    en:{ app_title:'Waste logging', app_sub:'Visma House Oslo · operations',
      q_fraction:'Select fraction', q_floor:'Which floor?', back:'‹ Back',
      floor_small:'floor', save:'Save entry', nav_reg:'Register', nav_log:'Log',
      log_title:'Log', total_today:'Total today', export:'⬇ Export CSV', clear:'Clear log',
      photo_add:'📷 Attach a photo of the scale', photo_done:'Photo attached · tap to change',
      empty:'No entries yet.<br>Tap “Register” to start.',
      saved:'Saved', saved_nophoto:'Saved (without photo – low space)', cleared:'Log cleared',
      logempty:'The log is empty', csv_done:'CSV exported', photo_err:'Could not read the image', pin_wrong:'Wrong code',
      confirm_clear:'Clear the whole log? Export to CSV first if you want to keep the data.',
      floor_entry:n=>'Floor '+n, csv_head:['Timestamp','Fraction','Floor','Kilos'] }
  };
  let lang = (function(){ try{ const s=localStorage.getItem('avfallLang'); if(s&&STR[s]) return s; }catch(e){}
    return (navigator.language||'no').slice(0,2).toLowerCase()==='en' ? 'en' : 'no'; })();
  function t(k){ return (STR[lang] && STR[lang][k]!==undefined) ? STR[lang][k] : STR.no[k]; }

  /* ---- fractions (name per language) ---- */
  const FRACTIONS = [
    { key:'rest',          no:'Restavfall',          en:'Residual waste',    icon:'🗑️', color:'#4A4A55' },
    { key:'papir',         no:'Papir og papp',       en:'Paper & cardboard', icon:'📰', color:'#1E6FD9' },
    { key:'plast',         no:'Plastemballasje',     en:'Plastic packaging', icon:'🥤', color:'#7F56FA' },
    { key:'mat',           no:'Matavfall',           en:'Food waste',        icon:'🍎', color:'#2E9E5B' },
    { key:'glassmetall',   no:'Glass og metall',     en:'Glass & metal',     icon:'🍾', color:'#17A2B8' },
    { key:'pant',          no:'Pant',                en:'Deposit return',    icon:'♻️', color:'#E08A1E' },
    { key:'farlig',        no:'Farlig avfall',       en:'Hazardous waste',   icon:'☣️', color:'#D6353B' },
    { key:'ee',            no:'EE-avfall',           en:'Electrical (WEEE)', icon:'🔌', color:'#C99700' },
    { key:'trevirke',      no:'Trevirke',            en:'Wood',              icon:'🪵', color:'#8B5E34' },
    { key:'konfidensielt', no:'Konfidensielt papir', en:'Confidential paper',icon:'🔒', color:'#5A6472' },
  ];
  const FRAC = Object.fromEntries(FRACTIONS.map(f => [f.key, f]));
  function fname(key){ const f = FRAC[key]; return f ? (f[lang] || f.no) : key; }

  /* ---- state ---- */
  let state = { fraction:null, floor:null, kg:'', photo:null };
  let log = loadLog();
  function loadLog(){ try{ return JSON.parse(localStorage.getItem('wasteLog') || '[]'); }catch(e){ return []; } }
  function saveLog(){ try{ localStorage.setItem('wasteLog', JSON.stringify(log)); return true; }catch(e){ return false; } }

  /* ---- central storage: send each entry to a Google Sheet (Apps Script Web App) ----
     Paste your deployed Apps Script Web App URL below. Empty string = local only.
     The local log always keeps a copy; unsynced rows are retried on save + on open,
     so nothing is lost without signal (basements/garages). Photos stay local. */
  const SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwRB9xKbhiZwrayqwwB2deUsu3EzVf0nPAEsq8rykKcRX9uckj_CFutPD39EJQPu-Nq/exec';
  const ACCESS_PIN = '2470';         // shared access code (same every day) — change to your chosen code
  const PIN_TTL = 12*60*60*1000;     // unlock lasts 12 hours, then re-enter the code
  function syncEntry(e){
    return fetch(SHEET_ENDPOINT, {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({
        ts:new Date(e.ts).toISOString(), fraction:e.fraction, fractionName:fname(e.fraction),
        floor:e.floor, kg:e.kg, pin:ACCESS_PIN
      })
    });
  }
  let syncing = false;
  async function syncPending(){
    if(!SHEET_ENDPOINT || syncing) return;
    syncing = true; let changed = false;
    for(const e of log.filter(x=>!x.synced)){
      try{ await syncEntry(e); e.synced = true; changed = true; }
      catch(err){ break; }   // offline — keep the rest for next time
    }
    syncing = false;
    if(changed){ saveLog(); if(!document.getElementById('logView').classList.contains('hide')) renderLog(); }
  }

  let toastTimer;
  function toast(msg){
    const el = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove('show'), 3500);
  }

  /* ---- language ---- */
  function setLang(l){ if(!STR[l]) return; lang = l; try{ localStorage.setItem('avfallLang', l); }catch(e){} applyI18n(); }
  function applyI18n(){
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
    document.querySelectorAll('.lang button').forEach(b => b.classList.toggle('on', b.getAttribute('data-lang')===lang));
    document.getElementById('kDec').textContent = lang==='en' ? '.' : ',';
    renderFractions(); renderFloors();
    // refresh dynamic bits that may be visible
    if(state.fraction && state.floor) refreshChosen();
    updatePhotoBtn();
    if(!document.getElementById('logView').classList.contains('hide')) renderLog();
  }

  /* ---- view switch ---- */
  function showView(v){
    document.getElementById('reg').classList.toggle('hide', v!=='reg');
    document.getElementById('logView').classList.toggle('hide', v!=='log');
    document.getElementById('navReg').classList.toggle('on', v==='reg');
    document.getElementById('navLog').classList.toggle('on', v==='log');
    if(v==='log') renderLog();
    window.scrollTo(0,0);
  }

  /* ---- wizard ---- */
  function goStep(n){
    [1,2,3].forEach(i=>{
      document.getElementById('step'+i).classList.toggle('hide', i!==n);
      document.getElementById('st'+i).classList.toggle('on', i<=n);
    });
    window.scrollTo(0,0);
  }
  function renderFractions(){
    document.getElementById('fracGrid').innerHTML = FRACTIONS.map(f =>
      `<button class="frac" style="background:${f.color}" onclick="selectFraction('${f.key}')">
        <span class="fi">${f.icon}</span><span class="fn">${f[lang]||f.no}</span>
      </button>`
    ).join('');
  }
  function selectFraction(key){ state.fraction = key; renderFloors(); goStep(2); }
  function renderFloors(){
    let html = '';
    for(let i=1;i<=9;i++) html += `<button class="floor" onclick="selectFloor(${i})">${i}<small>${t('floor_small')}</small></button>`;
    document.getElementById('floorGrid').innerHTML = html;
  }
  function selectFloor(n){
    state.floor = n; state.kg = ''; state.photo = null;
    refreshChosen(); updatePhotoBtn(); updateKg(); goStep(3);
  }
  function refreshChosen(){
    const f = FRAC[state.fraction]; if(!f) return;
    const chip = document.getElementById('chChip');
    chip.style.background = f.color; chip.textContent = f.icon + ' ' + (f[lang]||f.no);
    document.getElementById('chFloor').textContent = t('floor_entry')(state.floor);
  }
  function updatePhotoBtn(){
    const b = document.getElementById('photoBtn');
    b.innerHTML = state.photo ? `<img src="${state.photo}" alt=""> ${t('photo_done')}` : t('photo_add');
  }

  /* ---- weight keypad ---- */
  function keyKg(d){
    if(d==='.'){ if(state.kg.includes('.')) return; if(state.kg==='') state.kg='0'; }
    if(/\.\d/.test(state.kg) && d!=='.') return;       // max 1 decimal
    if(state.kg.replace('.','').length >= 5) return;    // sane cap
    state.kg += d; updateKg();
  }
  function kgBack(){ state.kg = state.kg.slice(0,-1); updateKg(); }
  function updateKg(){
    const shown = (state.kg==='' ? '0' : state.kg);
    document.getElementById('kgVal').textContent = lang==='en' ? shown : shown.replace('.',',');
    document.getElementById('saveBtn').disabled = !(parseFloat(state.kg) > 0);
  }

  /* ---- photo (downscaled thumbnail so localStorage stays small) ---- */
  function onPhoto(input){
    const file = input.files && input.files[0]; if(!file) return;
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const max = 420, s = Math.min(1, max/Math.max(img.width, img.height));
      const cw = Math.round(img.width*s), ch = Math.round(img.height*s);
      const cv = document.createElement('canvas'); cv.width=cw; cv.height=ch;
      cv.getContext('2d').drawImage(img,0,0,cw,ch);
      URL.revokeObjectURL(url);
      try{ state.photo = cv.toDataURL('image/jpeg', 0.55); }catch(e){ state.photo = null; }
      updatePhotoBtn();
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); toast(t('photo_err')); };
    img.src = url;
  }

  /* ---- save ---- */
  function saveEntry(){
    const kg = parseFloat(state.kg);
    if(!(kg > 0)) return;
    log.unshift({ id:Date.now(), fraction:state.fraction, floor:state.floor, kg:kg, ts:Date.now(), photo:state.photo || null, synced:false });
    if(!saveLog()){ log[0].photo = null; saveLog(); toast(t('saved_nophoto')); }
    else { toast(t('saved') + ': ' + fname(state.fraction) + ' · ' + t('floor_entry')(state.floor) + ' · ' + fmtKg(kg) + ' kg'); }
    state = { fraction:null, floor:null, kg:'', photo:null };
    goStep(1);
    syncPending();   // push to the Google Sheet (if configured)
  }

  /* ---- log view ---- */
  function isToday(ts){ return new Date(ts).toDateString() === new Date().toDateString(); }
  function fmtKg(n){ const v=(Math.round(n*10)/10).toString(); return lang==='en' ? v : v.replace('.',','); }
  function renderLog(){
    const today = log.filter(r=>isToday(r.ts));
    document.getElementById('grandKg').textContent = fmtKg(today.reduce((a,r)=>a+r.kg,0)) + ' kg';
    const byFrac = {};
    today.forEach(r=>{ byFrac[r.fraction]=(byFrac[r.fraction]||0)+r.kg; });
    document.getElementById('totals').innerHTML = FRACTIONS.filter(f=>byFrac[f.key]).map(f=>
      `<div class="tot"><span style="background:${f.color}">${f.icon}</span>${fmtKg(byFrac[f.key])} kg · ${f[lang]||f.no}</div>`
    ).join('');
    const box = document.getElementById('entries');
    if(!log.length){
      box.innerHTML = `<div class="empty">${t('empty')}</div>`;
      document.getElementById('logBtns').classList.add('hide');
      return;
    }
    document.getElementById('logBtns').classList.remove('hide');
    box.innerHTML = log.map(r=>{
      const f = FRAC[r.fraction] || {icon:'❓', color:'#8A8A95'};
      const when = new Date(r.ts).toLocaleString(lang==='en'?'en-GB':'nb-NO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="entry">
        <div class="dot" style="background:${f.color}">${f.icon}</div>
        <div class="einfo"><b>${fname(r.fraction)}</b><small>${t('floor_entry')(r.floor)} · ${when}${SHEET_ENDPOINT ? (r.synced?' · ☁︎':' · ⏳') : ''}</small></div>
        ${r.photo ? `<img class="eth" src="${r.photo}" alt="">` : ''}
        <div class="ekg">${fmtKg(r.kg)} kg</div>
      </div>`;
    }).join('');
  }

  /* ---- CSV export (cross-platform: iOS data URI, others blob download) ---- */
  function exportCsv(){
    if(!log.length){ toast(t('logempty')); return; }
    const rows = [ t('csv_head'), ...log.map(r=>[
      new Date(r.ts).toLocaleString(lang==='en'?'en-GB':'nb-NO'), fname(r.fraction), r.floor, fmtKg(r.kg)
    ])];
    const csv = '﻿' + rows.map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
    const filename = 'avfall-' + new Date().toISOString().slice(0,10) + '.csv';
    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
    if(isIOS){ window.location.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); }
    else{
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 2000);
    }
    toast(t('csv_done') + ' (' + log.length + ')');
  }
  function clearLog(){
    if(!log.length) return;
    if(!confirm(t('confirm_clear'))) return;
    log = []; saveLog(); renderLog(); toast(t('cleared'));
  }

  /* ---- PIN lock: enter the code to open the app for 12 hours ---- */
  let pinEntry = '';
  function renderPinDots(){
    let s=''; for(let i=0;i<ACCESS_PIN.length;i++) s += (i<pinEntry.length ? '●' : '○');
    var el=document.getElementById('pinDots'); if(el) el.textContent = s;
  }
  function keyPin(d){
    document.getElementById('pinErr').textContent = '';
    if(pinEntry.length >= ACCESS_PIN.length) return;
    pinEntry += d; renderPinDots();
    if(pinEntry.length === ACCESS_PIN.length) checkPin();
  }
  function delPin(){ pinEntry = pinEntry.slice(0,-1); renderPinDots(); }
  function checkPin(){
    if(pinEntry === ACCESS_PIN){
      try{ localStorage.setItem('pinUntil', String(Date.now() + PIN_TTL)); }catch(e){}
      unlockApp();
    } else {
      document.getElementById('pinErr').textContent = t('pin_wrong');
      pinEntry = ''; renderPinDots();
    }
  }
  function pinValid(){ try{ return Date.now() < (parseInt(localStorage.getItem('pinUntil'),10) || 0); }catch(e){ return false; } }
  function unlockApp(){ pinEntry=''; document.getElementById('pinGate').style.display = 'none'; }

  /* ---- init ---- */
  applyI18n();
  goStep(1);
  syncPending();   // retry any rows not yet sent to the Sheet
  renderPinDots();
  if(pinValid()) unlockApp();   // still inside the 12-hour window → skip the lock
</script>
</body>
</html>
